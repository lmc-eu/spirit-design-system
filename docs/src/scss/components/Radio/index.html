  <body>

    
      <main class="py-800">
        <div class="Container">
    
          
          <section class="docs-Section">
          
            <h2 class="docs-Heading">Default</h2>
          
            <div class="docs-Stack docs-Stack--start">
          
              <label for="radioDefault" class="Radio">
                <input type="radio" id="radioDefault" class="Radio__input" name="default" />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                </span>
              </label>
          
              <label for="radioDefaultChecked" class="Radio">
                <input type="radio" id="radioDefaultChecked" class="Radio__input" name="default" checked />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                </span>
              </label>
          
            </div>
          
          </section>
          
          <section class="docs-Section">
          
            <h2 class="docs-Heading">Hidden Label</h2>
          
            <div class="docs-Stack docs-Stack--start">
          
              <label for="radioHiddenLabel" class="Radio">
                <input type="radio" id="radioHiddenLabel" class="Radio__input" name="hiddenLabel" />
                <span class="Radio__text">
                  <span class="Radio__label Radio__label--hidden">Radio Label</span>
                </span>
              </label>
          
            </div>
          
          </section>
          
          <section class="docs-Section">
          
            <h2 class="docs-Heading">Helper Text</h2>
          
            <div class="docs-Stack docs-Stack--start">
          
              <label for="radioHelperText" class="Radio">
                <input type="radio" id="radioHelperText" class="Radio__input" name="helperText" />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                  <span class="Radio__helperText">Helper text</span>
                </span>
              </label>
          
            </div>
          
          </section>
          
          <section class="docs-Section">
          
            <h2 class="docs-Heading">Disabled</h2>
          
            <div class="docs-Stack docs-Stack--start">
          
              <label for="radioDisabled" class="Radio Radio--disabled">
                <input type="radio" id="radioDisabled" class="Radio__input" name="disabled" disabled />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                </span>
              </label>
          
              <label for="radioDisabledHelperText" class="Radio Radio--disabled">
                <input type="radio" id="radioDisabledHelperText" class="Radio__input" name="disabledHelperText" disabled checked />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                  <span class="Radio__helperText">Helper text</span>
                </span>
              </label>
          
            </div>
          
          </section>
          
          <section class="docs-Section">
          
            <h2 class="docs-Heading">Validation State</h2>
          
             <div class="docs-Stack docs-Stack--start">
          
              <label for="radioSuccess" class="Radio Radio--success">
                <input type="radio" id="radioSuccess" class="Radio__input" name="validation" />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                </span>
              </label>
          
              <label for="radioWarning" class="Radio Radio--warning">
                <input type="radio" id="radioWarning" class="Radio__input" name="validation" />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                </span>
              </label>
          
              <label for="radioDanger" class="Radio Radio--danger">
                <input type="radio" id="radioDanger" class="Radio__input" name="validation" />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                </span>
              </label>
          
              <label for="radioWarningHelperText" class="Radio Radio--warning">
                <input type="radio" id="radioWarningHelperText" class="Radio__input" name="validation" checked />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                  <span class="Radio__helperText">Helper text</span>
                </span>
              </label>
          
            </div>
          
          </section>
          
          <section class="docs-Section">
          
            <h2 class="docs-Heading">Item</h2>
          
             <div class="docs-Stack docs-Stack--start">
              <label for="radioItemDefault" class="Radio Radio--item">
                <input type="radio" id="radioItemDefault" class="Radio__input" name="item" />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                </span>
              </label>
          
              <label for="radioItemDefaultChecked" class="Radio Radio--item">
                <input type="radio" id="radioItemDefaultChecked" class="Radio__input" name="item" checked />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                </span>
              </label>
          
              <label for="radioItemHelperText" class="Radio Radio--item">
                <input type="radio" id="radioItemHelperText" class="Radio__input" name="item" />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                  <span class="Radio__helperText">Helper text</span>
                </span>
              </label>
          
              <label for="radioItemDisabled" class="Radio Radio--item Radio--disabled">
                <input type="radio" id="radioItemDisabled" class="Radio__input" name="itemDisabled" disabled />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                </span>
              </label>
          
              <label for="radioItemDisabledHelperText" class="Radio Radio--item Radio--disabled">
                <input
                  type="radio"
                  id="radioItemDisabledHelperText"
                  class="Radio__input"
                  name="itemDisabled"
                  disabled
                  checked
                />
                <span class="Radio__text">
                  <span class="Radio__label">Radio Label</span>
                  <span class="Radio__helperText">Helper text</span>
                </span>
              </label>
          
            </div>
            
          </section>
          
    
        </div>
