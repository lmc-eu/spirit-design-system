        <div class="Container">

              </span>
            </label>
            <label for="checkboxfield13" class="CheckboxField">
              <input type="checkbox" id="checkboxfield13" class="CheckboxField__input" />

              </span>

                <span class="CheckboxField__message">Success validation message</span>
              </span>
            </label>
            <label for="checkboxfield15_3" class="CheckboxField CheckboxField--warning">
              <input type="checkbox" id="checkboxfield15_3" class="CheckboxField__input" value="Filled" />

                <span class="CheckboxField__label">Label of input with warning</span>
                <span class="CheckboxField__helperText">Helper text</span>
                <span class="CheckboxField__message">Warning validation message</span>
              </span>

              </span>
            </label>

                <span class="CheckboxField__message">Success validation message</span>

              <span class="CheckboxField__text">

            const inputs = ['checkboxfield14', 'checkboxfield15', 'checkboxfield16', 'checkboxfield17'];
          
            window.addEventListener('DOMContentLoaded', function () {
              inputs.forEach(function (input) {
                const checkbox = document.getElementById(input);
                checkbox.indeterminate = true;
              });
            });
          </script>
