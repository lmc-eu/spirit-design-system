services:
  e2e:
    init: true
    image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-${UBUNTU_VERSION}
    working_dir: /work/
    volumes:
      - ${PWD}:/work/
    ipc: host
    ports:
      - ${UI_PORT:-43008}:${UI_PORT:-43008}
    network_mode: host
    command: >
      bash -c "set -x &&
      corepack enable && corepack install &&
      yarn test:e2e${E2E_FLAG}"
